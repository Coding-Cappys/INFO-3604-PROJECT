databases:
  - name: uwi-festival-db
    databaseName: uwi_festival
    plan: free

services:
  - type: web
    name: uwi-festival
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd artifacts/uwi-festival && gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: uwi-festival-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
